<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diário de Serviço</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#639922; --green-light:#EAF3DE; --green-mid:#97C459;
  --green-dark:#3B6D11; --green-border:#C0DD97;
  --bg:#f5f5f0; --surface:#ffffff; --border:rgba(0,0,0,0.10);
  --border-med:rgba(0,0,0,0.18); --text:#1a1a18; --text-sec:#6b6b67;
  --radius-md:8px; --radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18; --surface:#242422; --border:rgba(255,255,255,0.10);
  --border-med:rgba(255,255,255,0.18); --text:#f0ede8; --text-sec:#9e9e9a;
  --green-light:#1a2e0a; --green-border:#3B6D11; --green-dark:#97C459;
}}
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:1.5rem 1rem 3rem; }
.wrap { max-width:560px; margin:0 auto; }
.app-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.app-title { font-size:20px; font-weight:600; }
.sync-badge { font-size:11px; padding:4px 10px; border-radius:99px; background:var(--green-light); color:var(--green-dark); border:1px solid var(--green-border); display:flex; align-items:center; gap:6px; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.day-nav { display:flex; align-items:center; gap:8px; margin-bottom:1.5rem; }
.day-nav button { background:var(--surface); border:1px solid var(--border-med); border-radius:var(--radius-md); padding:6px 14px; cursor:pointer; font-size:18px; color:var(--text-sec); }
.day-label { flex:1; text-align:center; font-size:15px; font-weight:600; }
.section { margin-bottom:1.25rem; }
.section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-sec); margin-bottom:8px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; }
.progress-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--text-sec); margin-bottom:6px; }
.progress-track { height:5px; background:var(--border); border-radius:99px; overflow:hidden; margin-bottom:12px; }
.progress-fill { height:100%; background:var(--green); border-radius:99px; transition:width 0.35s; }
.task-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
.task-item:last-child { border-bottom:none; padding-bottom:0; }
.task-item:first-child { padding-top:0; }
.checkbox { width:20px; height:20px; border-radius:5px; border:1.5px solid var(--border-med); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; font-size:13px; color:white; }
.task-item.done .checkbox { background:var(--green); border-color:var(--green); }
.check-icon { opacity:0; transition:opacity 0.15s; }
.task-item.done .check-icon { opacity:1; }
.task-name { font-size:14px; flex:1; }
.task-item.done .task-name { color:var(--green-dark); text-decoration:line-through; text-decoration-color:var(--green-mid); }
.task-badge { font-size:10px; padding:2px 8px; border-radius:99px; background:var(--green-light); color:var(--green-dark); border:1px solid var(--green-border); }
textarea { width:100%; border:none; background:transparent; resize:none; font-size:14px; font-family:inherit; color:var(--text); outline:none; min-height:90px; line-height:1.65; }
textarea::placeholder { color:var(--text-sec); }
.footer { display:flex; justify-content:space-between; align-items:center; margin-top:1.25rem; }
.btn { font-size:13px; border:1px solid var(--border-med); border-radius:var(--radius-md); padding:8px 16px; cursor:pointer; background:var(--surface); color:var(--text-sec); }
.btn-save { background:var(--green); color:white; border-color:var(--green); font-weight:600; }
.saved-msg { font-size:12px; color:var(--green); opacity:0; transition:opacity 0.4s; }
.saved-msg.show { opacity:1; }
.last-updated { font-size:11px; color:var(--text-sec); margin-top:8px; text-align:right; }
#config-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; padding:1.5rem; }
.config-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem; width:100%; max-width:420px; }
.config-box h2 { font-size:18px; font-weight:600; margin-bottom:6px; }
.config-box p { font-size:13px; color:var(--text-sec); margin-bottom:1.5rem; line-height:1.6; }
.config-box label { font-size:12px; color:var(--text-sec); display:block; margin-bottom:4px; }
.config-box input { width:100%; padding:10px 12px; border:1px solid var(--border-med); border-radius:var(--radius-md); background:var(--bg); color:var(--text); font-size:14px; font-family:inherit; margin-bottom:10px; outline:none; }
.btn-config { width:100%; background:var(--green); color:white; border-color:var(--green); font-weight:600; font-size:14px; padding:10px; margin-top:6px; border-radius:var(--radius-md); cursor:pointer; border:none; }
</style>
</head>
<body>

<div id="config-screen">
  <div class="config-box">
    <h2>Configurar Firebase</h2>
    <p>Cole as credenciais do seu projeto Firebase para sincronizar com seu companheiro.</p>
    <label>API Key</label><input id="cfg-apiKey" placeholder="AIzaSy..." />
    <label>Auth Domain</label><input id="cfg-authDomain" placeholder="meu-projeto.firebaseapp.com" />
    <label>Database URL</label><input id="cfg-dbUrl" placeholder="https://meu-projeto-default-rtdb.firebaseio.com" />
    <label>Project ID</label><input id="cfg-projectId" placeholder="meu-projeto" />
    <button class="btn-config" onclick="saveConfig()">Conectar e salvar</button>
  </div>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="app-header">
    <span class="app-title">Diário de Serviço</span>
    <span class="sync-badge"><span class="sync-dot"></span>Ao vivo</span>
  </div>
  <div class="day-nav">
    <button onclick="changeDay(-1)">&#8592;</button>
    <div class="day-label" id="day-label"></div>
    <button onclick="changeDay(1)">&#8594;</button>
  </div>
  <div class="section">
    <div class="section-title">Rotina Diária</div>
    <div class="card">
      <div class="progress-meta"><span id="prog-text">0 concluídas</span><span id="prog-pct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="task-list"></div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Atividades Realizadas Hoje</div>
    <div class="card"><textarea id="atividades" placeholder="Descreva tudo o que foi feito durante o serviço..." rows="5"></textarea></div>
  </div>
  <div class="section">
    <div class="section-title">Pendências</div>
    <div class="card"><textarea id="pendencias" placeholder="Algo que começou mas não terminou, para continuidade..." rows="4"></textarea></div>
  </div>
  <div class="footer">
    <button class="btn" onclick="resetDay()">&#8635; Reiniciar dia</button>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="saved-msg" id="saved-msg">&#10003; Salvo</span>
      <button class="btn btn-save" onclick="saveAll()">&#128190; Salvar</button>
    </div>
  </div>
  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const DAYS_BR = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const ALL_TASKS = [
  { id:'bol_pm',    label:'Ler Bol PM',                 badge:null },
  { id:'bol_res',   label:'Ler Bol Reservado',          badge:'4ª e 6ª' },
  { id:'falta',     label:'Tirar Falta do Efetivo AIB', badge:null },
  { id:'sipmerj',   label:'SIPMERJ',                     badge:null },
  { id:'zimbra',    label:'Zimbra',                      badge:null },
  { id:'email_res', label:'E-mail Reservado',            badge:null },
  { id:'encerrar',  label:'Encerrar o serviço',          badge:'Final' },
];

let db, autoSaveTimer = null, isLoading = false, unsubscribe = null;

// Navegação por data real (evita bug de offset acumulado)
let navDate = new Date();
navDate.setHours(0,0,0,0);

function getDayKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return 'dia_' + y + '_' + m + '_' + day;
}

function getDayLabel(d) {
  const now = new Date(); now.setHours(0,0,0,0);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dt = dd + '/' + mm + '/' + d.getFullYear();
  const diff = Math.round((d - now) / 86400000);
  if(diff === 0) return 'Hoje · ' + dt;
  if(diff === -1) return 'Ontem · ' + dt;
  if(diff === 1) return 'Amanhã · ' + dt;
  return DAYS_BR[d.getDay()] + ' · ' + dt;
}

function isWedOrFri(d) { return [3,5].includes(d.getDay()); }
function getTasks(d) { return ALL_TASKS.filter(t => t.id !== 'bol_res' || isWedOrFri(d)); }

function changeDay(dir) {
  const d = new Date(navDate);
  d.setDate(d.getDate() + dir);
  d.setHours(0,0,0,0);
  navDate = d;
  loadDay();
}

function loadConfig() {
  try { return JSON.parse(localStorage.getItem('firebase_cfg') || 'null'); } catch(e) { return null; }
}

function saveConfig() {
  const cfg = {
    apiKey:      document.getElementById('cfg-apiKey').value.trim(),
    authDomain:  document.getElementById('cfg-authDomain').value.trim(),
    databaseURL: document.getElementById('cfg-dbUrl').value.trim(),
    projectId:   document.getElementById('cfg-projectId').value.trim(),
  };
  if(!cfg.apiKey || !cfg.databaseURL) { alert('Preencha ao menos API Key e Database URL.'); return; }
  localStorage.setItem('firebase_cfg', JSON.stringify(cfg));
  initFirebase(cfg);
}

function initFirebase(cfg) {
  try {
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.database();
    document.getElementById('config-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadDay();
  } catch(e) {
    alert('Erro ao conectar ao Firebase.\n\n' + e.message);
  }
}

function renderTasks(tasks, checked, key) {
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  tasks.forEach(function(t) {
    const done = !!checked[t.id];
    const el = document.createElement('div');
    el.className = 'task-item' + (done ? ' done' : '');
    el.innerHTML = '<div class="checkbox"><span class="check-icon">&#10003;</span></div>'
      + '<span class="task-name">' + t.label + '</span>'
      + (t.badge ? '<span class="task-badge">' + t.badge + '</span>' : '');
    el.onclick = (function(taskId, dayKey) {
      return function() { toggleTask(taskId, dayKey); };
    })(t.id, key);
    list.appendChild(el);
  });
}

function updateProgress(tasks, checked) {
  const total = tasks.length;
  const done = tasks.filter(function(t){ return checked[t.id]; }).length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('prog-text').textContent = done + ' de ' + total + ' concluídas';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function loadDay() {
  const d = new Date(navDate);
  const key = getDayKey(d);
  const tasks = getTasks(d);
  document.getElementById('day-label').textContent = getDayLabel(d);

  if(unsubscribe) { unsubscribe(); unsubscribe = null; }

  const ref = db.ref('servico/' + key);
  unsubscribe = ref.on('value', function(snap) {
    isLoading = true;
    const data = snap.val() || { checked:{}, atividades:'', pendencias:'' };
    renderTasks(tasks, data.checked || {}, key);
    updateProgress(tasks, data.checked || {});
    document.getElementById('atividades').value = data.atividades || '';
    document.getElementById('pendencias').value = data.pendencias || '';
    document.getElementById('last-updated').textContent = data.savedAt ? 'Última atualização: ' + data.savedAt : '';
    isLoading = false;
  });
}

function toggleTask(id, key) {
  db.ref('servico/' + key + '/checked/' + id).transaction(function(val) { return !val; });
}

function saveAll() {
  const key = getDayKey(navDate);
  const now = new Date();
  const ts = String(now.getDate()).padStart(2,'0') + '/' + String(now.getMonth()+1).padStart(2,'0') + ' às ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  db.ref('servico/' + key).update({
    atividades: document.getElementById('atividades').value,
    pendencias: document.getElementById('pendencias').value,
    savedAt: ts,
  }).then(function() {
    const msg = document.getElementById('saved-msg');
    msg.classList.add('show');
    setTimeout(function(){ msg.classList.remove('show'); }, 2000);
    document.getElementById('last-updated').textContent = 'Última atualização: ' + ts;
  });
}

function resetDay() {
  if(!confirm('Reiniciar apaga as marcações e textos do dia. Confirma?')) return;
  const key = getDayKey(navDate);
  db.ref('servico/' + key).remove();
  document.getElementById('atividades').value = '';
  document.getElementById('pendencias').value = '';
}

['atividades','pendencias'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    if(isLoading) return;
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(saveAll, 3000);
  });
});

const cfg = loadConfig();
if(cfg) initFirebase(cfg);
</script>
</body>
</html>
